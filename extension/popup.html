<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      font-size: 13px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px 8px;
      border-bottom: 1px solid #2a2a4a;
    }
    .logo {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: #e0e0e0;
      text-decoration: none;
    }
    .logo:hover { color: #6c63ff; }
    .status {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: #999;
    }
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #d9534f;
    }
    .status-dot.connected { background: #5cb85c; }
    .status-dot.checking { background: #d4af37; }

    .body { padding: 12px 14px; }

    .page-info {
      background: #252545;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 10px;
    }
    .page-title {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .page-url {
      font-size: 11px;
      color: #888;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tags-input {
      width: 100%;
      background: #252545;
      border: 1px solid #3a3a5a;
      border-radius: 6px;
      padding: 7px 10px;
      color: #e0e0e0;
      font-size: 12px;
      margin-bottom: 10px;
      outline: none;
    }
    .tags-input:focus { border-color: #6c63ff; }
    .tags-input::placeholder { color: #666; }

    .actions { display: flex; gap: 8px; }

    .btn {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: opacity 0.15s;
    }
    .btn:disabled { opacity: 0.5; cursor: default; }

    .btn-primary {
      background: #6c63ff;
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) { background: #5a52e0; }

    .btn-secondary {
      background: #2a2a4a;
      color: #ccc;
    }
    .btn-secondary:hover:not(:disabled) { background: #3a3a5a; }

    .feedback {
      padding: 8px 12px;
      border-radius: 6px;
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
    }
    .feedback.success { background: #1a3a2a; color: #5cb85c; }
    .feedback.error { background: #3a1a1a; color: #d9534f; }

    .settings-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-top: 1px solid #2a2a4a;
      font-size: 11px;
      color: #777;
    }
    .settings-input {
      flex: 1;
      background: #252545;
      border: 1px solid #3a3a5a;
      border-radius: 4px;
      padding: 4px 6px;
      color: #ccc;
      font-size: 11px;
      outline: none;
    }
    .settings-input:focus { border-color: #6c63ff; }

    .jobs {
      border-top: 1px solid #2a2a4a;
      padding: 8px 14px;
      max-height: 160px;
      overflow-y: auto;
    }
    .jobs-header {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #666;
      margin-bottom: 6px;
    }
    .job-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      font-size: 12px;
    }
    .job-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: #ccc;
    }
    .job-status {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      white-space: nowrap;
    }
    .job-status.done { background: #1a3a2a; color: #5cb85c; }
    .job-status.queued { background: #3a3a1a; color: #d4af37; }
    .job-status.synthesizing { background: #3a2a1a; color: #d4956a; }
    .job-status.failed { background: #3a1a1a; color: #d9534f; }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <a href="#" id="logoLink" class="logo">readcast</a>
    <div class="status">
      <div class="status-dot checking" id="statusDot"></div>
      <span id="statusText">Checking...</span>
    </div>
  </div>

  <div class="body">
    <div class="page-info">
      <div class="page-title" id="pageTitle">Loading...</div>
      <div class="page-url" id="pageUrl"></div>
    </div>

    <input
      type="text"
      class="tags-input"
      id="tagsInput"
      placeholder="Tags (comma-separated, optional)"
    >

    <div class="actions">
      <button class="btn btn-primary" id="addPageBtn" disabled>
        Add Page
      </button>
      <button class="btn btn-secondary" id="addSelectionBtn" disabled title="Select text on the page first">
        Add Selection
      </button>
    </div>

    <div id="feedback" style="display:none"></div>
  </div>

  <div id="recentJobs" class="jobs" style="display:none">
    <div class="jobs-header">Recent</div>
    <div id="jobsList"></div>
  </div>

  <div class="settings-row">
    <span>Server:</span>
    <input type="text" class="settings-input" id="serverInput" placeholder="http://127.0.0.1:8765">
  </div>

  <script src="popup.js"></script>
</body>
</html>
