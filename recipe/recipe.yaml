schema_version: 1

context:
  name: readcast
  version: ${{ env.get("READCAST_VERSION") }}

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  path: ..

build:
  number: 0
  noarch: python
  script:
    - python -m pip install . --no-deps --no-build-isolation -vv
  python:
    entry_points:
      - readcast = readcast.cli.main:cli

requirements:
  host:
    - python >=3.11
    - pip
    - hatchling
  run:
    - python >=3.11
    - kokoro-edge >=0.1.1
    - ffmpeg
    - httpx >=0.27
    - readability-lxml >=0.8
    - beautifulsoup4 >=4.12
    - lxml >=5.0
    - mutagen >=1.47
    - click >=8.1
    - rich >=13.0
    - fastapi >=0.115
    - uvicorn >=0.30
    - num2words >=0.5
    - packaging >=23.0
    - local-knowledge >=0.5.0
    - yt-dlp

tests:
  - python:
      imports:
        - readcast
        - readcast.cli.main
        - readcast.core.extractor
        - readcast.core.store
        - readcast.api.app
  - script:
      - readcast --help

about:
  homepage: https://github.com/grej/readcast
  documentation: https://github.com/grej/readcast#install
  repository: https://github.com/grej/readcast
  license: MIT
  license_file: LICENSE
  summary: Personal knowledge engine for your Mac
  description: |
    Readcast is a local-first knowledge engine for macOS. Capture web articles,
    threads, and text — search by keyword and meaning via hybrid semantic search,
    auto-tag with topics and entities using local ML, build a knowledge graph,
    and generate audio podcasts. Runs entirely on Apple Silicon with MLX.

    Install with pixi (recommended):
      pixi global install readcast -c https://conda.anaconda.org/gjennings -c conda-forge

    This package requires conda-forge for its dependencies (httpx, fastapi, etc.).
    The default conda install command above will not resolve — use pixi or add
    -c conda-forge when installing with conda.
