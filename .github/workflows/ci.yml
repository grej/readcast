name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.8.8

      - name: Install environment
        run: pixi install

      - name: Install frontend dependencies
        run: npm ci

      - name: Run checks
        run: pixi run check
